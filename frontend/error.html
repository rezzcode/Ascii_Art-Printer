<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>500 Internal Server Error</title>
  <style>
    :root { --bg:#0f1724; --card:#0b1220; --accent:#ff6b6b; --muted:#9aa4b2; }
    html,body { height:100%; margin:0; font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background:linear-gradient(180deg,#071028 0%, #0b1220 100%); color:#e6eef6; }
    .wrap { min-height:100%; display:flex; align-items:center; justify-content:center; padding:3rem; }
    .card { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.03); padding:2.25rem; border-radius:12px; text-align:center; max-width:720px; width:100%; box-shadow:0 6px 30px rgba(2,6,23,0.6); }
    h1 { font-size:5rem; margin:0; line-height:1; color:var(--accent); }
    h2 { margin:0.5rem 0 1rem; font-weight:600; color:#fff; }
    p { margin:0 0 1.25rem; color:var(--muted); }
    .actions { display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap; }
    .btn { background:#0b1220; color:#e6eef6; border:1px solid rgba(255,255,255,0.06); padding:0.6rem 1rem; border-radius:8px; text-decoration:none; font-weight:600; cursor:pointer; }
    .btn.primary { background:var(--accent); border-color:rgba(0,0,0,0.15); color:#081017; }
    .small { font-size:0.85rem; color:var(--muted); margin-top:1rem; }
    @media (max-width:420px){ h1 { font-size:3.4rem; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="alert" aria-labelledby="title" aria-describedby="desc">
      <h1 id="title">500</h1>
      <h2>Internal Server Error</h2>
      <p id="desc">Sorry — something went wrong on our end. The server encountered an unexpected condition and couldn't complete your request.</p>
      <div class="actions">
        <a class="btn primary" href="/" title="Go to home">Go to Home</a>
        <button class="btn" onclick="location.reload()">Retry</button>
      </div>
      <div class="small">If the problem persists, please try again later or contact support.</div>
    </div>
  </div>
</body>
</html>
