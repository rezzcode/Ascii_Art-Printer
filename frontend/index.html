<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ASCII Art Web</title>
  <style>

/* Theme variables */
:root{
  --bg-1: #0f1724;
  --bg-2: #071028;
  --panel: #0b1220;
  --accent: #7ee787;
  --muted: #9aa5b1;
  --glass: rgba(255,255,255,0.03);
  --radius: 10px;
  --transition: 180ms ease;
}

/* Reset */
*{box-sizing:border-box}
html,body{height:100%;margin:0}

/* Layout */
body{
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
  color: #e6eef6;
  padding: 2.25rem;
}


/* Heading */
h1{
  margin:0 0 .5rem 0;
  font-size:1.6rem;
  letter-spacing:0.4px;
  color: rgb(248, 142, 4);
}

/* Form layout */
label{ display:block; font-size:0.95rem; color:var(--muted); margin-top:.6rem; }
input[type="text"]{
  width:100%;
  padding:.5rem .6rem;
  margin-top:.35rem;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.06);
  background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.00));
  color: #e6eef6;
  outline: none;
  transition: box-shadow var(--transition), border-color var(--transition);
}
input[type="text"]:focus{
  box-shadow: 0 0 0 4px rgba(126,231,135,0.06);
  border-color: var(--accent);
}

/* Fieldset */
fieldset{
  margin-top: .9rem;
  border-radius:8px;
  border:4px solid rgb(248, 142, 4);
  padding: .8rem;
  background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.00));
}
fieldset legend{ font-weight:600; color:var(--muted); font-size:.95rem; }

/* Radio group */
fieldset > div:first-of-type{
  display:flex;
  gap:1rem;
  align-items:center;
  flex-wrap:wrap;
  margin-top:.6rem;
}
input[type="radio"]{
  accent-color: var(--accent);
  width:1.05rem;
  height:1.05rem;
  margin-right:.25rem;
}
label[for^="contactChoice"]{
  display:flex;
  align-items:center;
  gap:.35rem;
  background: var(--glass);
  padding:.35rem .6rem;
  border-radius:7px;
  color:#cfe9d3;
  font-weight:600;
  cursor:pointer;
}

/* Buttons */
button{
  appearance:none;
  border: none;
  cursor: pointer;
  font-weight:600;
  color:#071021;
  background: linear-gradient(180deg, var(--accent), #4ac66b);
  padding: .55rem .9rem;
  border-radius:8px;
  transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
  box-shadow: 0 6px 18px rgba(10,20,12,0.18);
  margin-top:.6rem;
  display:inline-block;
}
button:hover{ transform: translateY(-2px); background: rgb(248, 142, 4); }
button:active{ transform: translateY(0); opacity:.95; }
button[type="submit"]{
  background: linear-gradient(180deg, #6aa6ff, #3e87ff);
  color: white;
}

/* Generate button */
#generate{
  margin-top: 1rem;
}

/* Small helper */
small{ color:var(--muted); display:block; margin-top:.35rem; }

/* Responsive */
@media (max-width:640px){
  .container{ padding:1rem; }
  h1{ font-size:1.25rem; }
  fieldset > div:first-of-type{ gap:.5rem; }
  input[type="text"]{ font-size:.95rem; }
}
#output { white-space: pre; color: rgb(248, 142, 4); padding:1rem; border-radius:6px; min-height:8rem; }
textarea {
  width: 100%;
  padding: .5rem .6rem;
  margin-top: .35rem;
  border-radius: 8px;
  border: 2px solid rgba(248, 142, 4, 0.233);
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0.00));
  color: #e6eef6;
  outline: none;
  transition: box-shadow var(--transition), border-color var(--transition);
  font-family: inherit;
  font-size: 1rem;
  resize: vertical;
}
textarea:focus {
  box-shadow: 0 0 0 4px rgba(126, 231, 135, 0.06);
  border-color: var(--accent);
}
  </style>
</head>
<body>
  <h1>ASCII Art</h1>

  <label for="message">Your Message:</label>
    <textarea id="text" type="text" name="message" rows="5" cols="30">
   
    </textarea>
  </label>

  <fieldset>
    <legend>Please select your preferred printout format method:</legend>
    <div>
      <input type="radio" id="contactChoice1" name="format" value="shadow.txt" />
      <label for="contactChoice1">Shadow</label>

      <input type="radio" id="contactChoice2" name="format" value="standard.txt" checked />
      <label for="contactChoice2">Standard</label>

      <input type="radio" id="contactChoice3" name="format" value="thinkertoy.txt" />
      <label for="contactChoice3">Thinkertoy</label>
    </div>
  </fieldset>

  <button id="generate">Generate</button>

  <h2>Result</h2>
  <pre id="output">Click "Generate" to call /test</pre>

  <script>
    const btn = document.getElementById('generate');
    const out = document.getElementById('output');
    const input = document.getElementById('text');

    btn.addEventListener('click', async () => {
      out.textContent = 'Loading...';
      try {
        const selected = document.querySelector('input[name="format"]:checked');
        const format = selected ? selected.value : 'standard.txt';

        const payload = {
          text: input.value || '',
          format: format
        };

        const res = await fetch('/ascii-art', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const errJson = await res.json().catch(() => ({}));
          throw new Error(errJson.error || res.status + ' ' + res.statusText);
        }

        const json = await res.json();
        out.textContent = json.message || 'No message returned';
      } catch (err) {
        out.textContent = 'Error: ' + err.message;
      }
    });
  </script>
</body>
</html>
